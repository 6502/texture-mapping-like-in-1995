    <script>

let run = ()=>{
    let src = document.getElementById("src").textContent.split("\n---\n"),
        slides = (()=>{
            let res = [],
                audio = {};
            src.forEach(ss => {
                ss = ss.replace(/\[\[([a-zA-Z0-9_.]+)\]\]/g, (x, c) => { audio[res.length] = c; return ""; });
                ss = ss.replace(/<code>\n(.*?)\n *<\/code>/gs, (x, c) => `<div class="code">${c.replace(/&/g, "&amp;").replace(/</g, "&lt;")}</div>`);
                if (ss.indexOf(":1:") >= 0) {
                    let n = 0;
                    ss.replace(/:([0-9]+):/g, (x, g) => n = Math.max(n, +g));
                    for (let i=0; i<=n; i++) {
                        res.push(ss.replace(/:([0-9]+):/g, (x, g) => {
                            if (+g > i) {
                                return "style=\"visibility:hidden\"";
                            } else {
                                return "";
                            }
                        }));
                    }
                } else {
                    let n = 0;
                    ss.replace(/#([0-9]+)#/g, (x, g) => n = Math.max(n, +g));
                    for (let i=0; i<=n; i++) {
                        res.push(ss.replace(/#([0-9]+)#(.*?)##/gs, (x, g, c) => {
                            if (+g !== i) {
                                return c;
                            } else {
                                return "<b>" + c + "</b>";
                            }
                        }));
                    }
                }
            });
            res = res.map(ss => ss.replace(/%%(.*?)%%/g, (_, g) =>
                      g.replace(/&#[0-9]+;/g, x => String.fromCharCode(+x.slice(2,-1)))
                       .split("")
                       .map(c => `<div class="char">${c.replace(/ /g,"&nbsp;")}</div>`)
                       .join("")));
            res.audio = audio;
            return res;
        })(),
        current = null,
        show = sno => {
            localStorage.setItem("sno", sno);
            let frame = document.createElement("div"),
                sf = Math.min(innerWidth/16, innerHeight/9)*0.99;
            frame.innerHTML = slides[sno];
            frame.className = "slide";
            frame.style.width = sf*16 + "px";
            frame.style.height = sf*9 + "px";
            frame.style.fontSize = sf*0.45 + "px";
            let slideno = document.createElement("div");
            slideno.className = "slideno";
            slideno.textContent = sno+1;
            frame.appendChild(slideno);
            document.body.appendChild(frame);
            frame._sno = sno;
            frame.onmousedown = (event) => {
                event.preventDefault();
                event.stopPropagation();
                if (event.button === 0) {
                    if (sno < slides.length -1) show(sno+1);
                } else if (event.button === 2) {
                    if (sno > 0) show(sno-1);
                }
            }
            if (slides.audio[sno]) {
                let a = new Audio(slides.audio[sno]);
                a.addEventListener("ended", ()=>{
                    show(sno+1);
                });
                a.play();
            }
            let t0 = Date.now(),
                cc = current,
                anim = ()=>{
                    let t = Math.min(1, (Date.now() - t0) / 250);
                    frame.style.opacity = t;
                    if (t === 1) {
                        if (cc) document.body.removeChild(cc);
                    } else {
                        setTimeout(anim, 16);
                    }
                };
            current = frame;
            setTimeout(anim, 16);
        };

    document.oncontextmenu = (event) => {
        event.preventDefault();
        event.stopPropagation();
    };

    let goto = "";

    document.onkeydown = (event)=>{
        if (event.key === "ArrowLeft" || event.key === "Tab") {
            event.preventDefault();
            event.stopPropagation();
            if (current && current._sno > 0) show(current._sno-1);
        } else if (event.key === "ArrowRight") {
            event.preventDefault();
            event.stopPropagation();
            if (current && current._sno < slides.length-1) show(current._sno+1);
        } else if (event.key === "ArrowUp") {
            event.preventDefault();
            event.stopPropagation();
            show(0);
        } else if (event.key === "ArrowDown") {
            event.preventDefault();
            event.stopPropagation();
            show(slides.length-1);
        } else if (event.key === "Backspace") {
            event.preventDefault();
            event.stopPropagation();
            goto = "";
        } else if (event.key >= "0" && event.key <= "9") {
            event.preventDefault();
            event.stopPropagation();
            goto = goto + event.key;
        } else if (event.key === "Enter") {
            event.preventDefault();
            event.stopPropagation();
            if (goto.length) {
                let n = +goto;
                if (n >= 1) {
                    show(Math.min(n, slides.length)-1);
                }
                goto = "";
            } else {
                if (current && current._sno < slides.length-1) show(current._sno+1);
            }
        }
        return true;
    };

    show(+(localStorage.getItem("sno") || "0"));

    let csz = innerWidth + "/" + innerHeight;
    setInterval(()=>{
        let sz = innerWidth + "/" + innerHeight;
        if (sz !== csz) {
            csz = sz;
            show(current._sno);
        }
    }, 10);
}

    </script>

    <h1>NumPy to the rescue</h1>

    <code>
def triangle(x0, y0, u0, v0,
             x1, y1, u1, v1,
             x2, y2, u2, v2,
             L, tx):
    delta = (x1-x0)*(y2-y0) - (x2-x0)*(y1-y0)
    if delta == 0: return
    ux = ((u1-u0)*(y2-y0) - (u2-u0)*(y1-y0)) / delta
    uy = ((x1-x0)*(u2-u0) - (x2-x0)*(u1-u0)) / delta
    uk = u0 - x0*ux - y0*uy
    vx = ((v1-v0)*(y2-y0) - (v2-v0)*(y1-y0)) / delta
    vy = ((x1-x0)*(v2-v0) - (x2-x0)*(v1-v0)) / delta
    vk = v0 - x0*vx - y0*vy

    nx01, ny01 = y1-y0, x0-x1
    nx12, ny12 = y2-y1, x1-x2
    nx20, ny20 = y0-y2, x2-x0
    k01 = -(x0*nx01 + y0*ny01)
    k12 = -(x1*nx12 + y1*ny12)
    k20 = -(x2*nx20 + y2*ny20)

    th, tw = tx.shape[:2]
    xa = max(0, int(min(x0, x1, x2)))
    ya = max(0, int(min(y0, y1, y2)))
    xb = min(w, int(max(x0, x1, x2))+1)
    yb = min(h, int(max(y0, y1, y2))+1)
    Xb = X[ya:yb, xa:xb]
    Yb = Y[ya:yb, xa:xb]
    aab = aa[ya:yb, xa:xb]
    mask = (np.uint8(Xb*nx01 + Yb*ny01 + k01 <= 0) &
            np.uint8(Xb*nx12 + Yb*ny12 + k12 <= 0) &
            np.uint8(Xb*nx20 + Yb*ny20 + k20 <= 0))
    xya = aab[mask == 1]
    xx = X.ravel()[xya]
    yy = Y.ravel()[xya]
    uv = np.int32(xx*vx + yy*vy + vk) & (th-1)
    uv *= tw
    uv += np.int32(xx*ux + yy*uy + uk) & (tw-1)
    img.reshape((w*h, 3))[xya] = np.int32(tx.reshape((tw*th,3))[uv] * L)
    </code>
